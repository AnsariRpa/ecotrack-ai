steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$_PROJECT_ID/ecotrack-ai/app:latest'
      - '.'

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$_PROJECT_ID/ecotrack-ai/app:latest'
    waitFor:
      - 'build-image'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-cloud-run'
    args:
      - 'run'
      - 'deploy'
      - 'ecotrack-ai'
      - '--image=us-central1-docker.pkg.dev/$_PROJECT_ID/ecotrack-ai/app:latest'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'
    waitFor:
      - 'push-image'

substitutions:
  _PROJECT_ID: 'pwapril'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

images:
  - 'us-central1-docker.pkg.dev/$_PROJECT_ID/ecotrack-ai/app:latest'