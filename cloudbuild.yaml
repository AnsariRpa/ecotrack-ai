steps:
  # Step 1: Run server tests
  - name: 'node:20'
    id: test-server
    entrypoint: npm
    args: ['run', 'test', '--workspace=server']
    env:
      - 'DATABASE_URL=file:./test.db'

  # Step 2: Build Docker image (multi-stage)
  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$_PROJECT_ID/ecotrack-ai/app:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$_PROJECT_ID/ecotrack-ai/app:latest'
      - '.'
    waitFor: ['test-server']

  # Step 3: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push-image
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$_PROJECT_ID/ecotrack-ai/app'
    waitFor: ['build-image']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy-cloud-run
    args:
      - 'run'
      - 'deploy'
      - 'ecotrack-ai'
      - '--image=us-central1-docker.pkg.dev/$_PROJECT_ID/ecotrack-ai/app:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push-image']

substitutions:
  _PROJECT_ID: 'your-gcp-project-id'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

images:
  - 'us-central1-docker.pkg.dev/$_PROJECT_ID/ecotrack-ai/app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$_PROJECT_ID/ecotrack-ai/app:latest'
