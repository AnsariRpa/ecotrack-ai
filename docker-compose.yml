version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecotrack-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: ecotrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecotrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecotrack-app
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/ecotrack?schema=public
      - NODE_ENV=production
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
